
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ficha de Inscrição - Restaurante</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column justify-content-between p-3">
    <div>
      <h2>Maranhão<br><span>Events</span></h2>
      <a href="/cadastro" class="btn btn-primary w-100 my-3">Cadastro</a>
      <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link" href="#">Eventos & Shows</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Restaurantes</a></li>
      </ul>
    </div>
    <div class="small">
      <p class="mb-0">Usuário</p>
      <span class="text-white-50">Administrador</span>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="flex-grow-1 p-4 bg-light">
    <header class="mb-4">
      <h1 class="h3">Adicione seu Restaurante</h1>
      <p class="text-muted">Preencha os dados abaixo para cadastrar o seu restaurante.</p>
    </header>

    <div class="card mx-auto shadow-sm" style="max-width: 700px;">
      <div class="card-body">
        <form action="/criar_restaurante" method="POST">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome:</label>
            <input type="text" class="form-control" id="nome" name="nome" required>
          </div>
          <div class="mb-3">
            <label for="descricao" class="form-label">Descrição:</label>
            <textarea class="form-control" id="descricao" name="descricao" required></textarea>
          </div>
          <div class="mb-3">
            <label for="tipo_cozinha" class="form-label">Tipo de Culinária:</label>
            <input type="text" class="form-control" id="tipo_cozinha" name="tipo_cozinha" required>
          </div>
          <div class="mb-3">
            <label for="horario_funcionamento" class="form-label">Horário de Abertura
            <input type="time" class="form-control" id="horario_funcionamento" name="horario_funcionamento" required>
          </div>
          <div class="mb-3">
            <label for="horario_funcionamento" class="form-label">Horário de Fechamento:</label>
            <input type="time" class="form-control" id="horario_funcionamento" name="horario_funcionamento" required>
          </div>
          <div class="mb-3">
            <label for="faixa_preco" class="form-label">Faixa de Preço:</label>
            <select class="form-select" id="faixa_preco" name="faixa_preco" required>
              <option value="R$">R$</option>
              <option value="R$$">R$$</option>
              <option value="R$$$">R$$$</option>
              <option value="R$$$$">R$$$$</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="capacidade" class="form-label">Capacidade:</label>
            <input type="number" class="form-control" id="capacidade" name="capacidade" required>
          </div>
          <div class="mb-3">
            <label for="imagem" class="form-label">Imagem do estabelecimento:</label>
            <input type="file" class="form-control" id="imagem" name="imagem">
          </div>
          <div class="mb-3">
            <label for="reservas" class="form-label">Aceita Reservas?</label>
            <select class="form-select" id="reservas" name="reservas">
              <option value="1">Sim</option>
              <option value="0">Não</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="delivery" class="form-label">Delivery?</label>
            <select class="form-select" id="delivery" name="delivery">
              <option value="1">Sim</option>
              <option value="0">Não</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="estacionamento" class="form-label">Estacionamento?</label>
            <select class="form-select" id="estacionamento" name="estacionamento">
              <option value="1">Sim</option>
              <option value="0">Não</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="fone_1" class="form-label">Telefone 1:</label>
            <input type="text" class="form-control" id="fone_1" name="fone_1" required>
          </div>
          <div class="mb-3">
            <label for="fone_2" class="form-label">Telefone 2:</label>
            <input type="text" class="form-control" id="fone_2" name="fone_2">
          </div>
          <h5 class="mt-4">Endereço</h5>
          <div class="mb-3">
            <label for="rua" class="form-label">Rua:</label>
            <input type="text" class="form-control" id="rua" name="rua" required>
          </div>
          <div class="mb-3">
            <label for="numero" class="form-label">Número:</label>
            <input type="text" class="form-control" id="numero" name="numero" required>
          </div>
          <div class="mb-3">
            <label for="bairro" class="form-label">Bairro:</label>
            <input type="text" class="form-control" id="bairro" name="bairro" required>
          </div>
          <div class="mb-3">
            <label for="cidade" class="form-label">Cidade:</label>
            <input type="text" class="form-control" id="cidade" name="cidade" required>
          </div>
          <div class="mb-3">
            <label for="estado" class="form-label">Estado:</label>
            <input type="text" class="form-control" id="estado" name="estado" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Enviar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
